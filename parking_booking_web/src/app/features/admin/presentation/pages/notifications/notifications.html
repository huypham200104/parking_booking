<section class="admin-page"><header><span>Trung tâm liên lạc</span><h1>Tạo thông báo</h1><p>Gửi thông báo trực tiếp đến một người dùng theo số điện thoại.</p></header><form [formGroup]="form" (ngSubmit)="submit()"><div *ngIf="error" class="alert error">{{error}}</div><div *ngIf="success" class="alert success">{{success}}</div><label>Số điện thoại<input formControlName="phoneNumber" placeholder="0901234567"><small *ngIf="form.controls.phoneNumber.touched&&form.controls.phoneNumber.invalid">Nhập số điện thoại gồm 10–11 chữ số.</small></label><label>Tiêu đề<input formControlName="title" placeholder="Tiêu đề thông báo"></label><label>Nội dung<textarea formControlName="message" rows="7" placeholder="Nội dung gửi đến người dùng"></textarea></label><button class="btn btn-primary" type="submit" [disabled]="saving">{{saving?'Đang gửi...':'Gửi thông báo'}}</button></form></section>
