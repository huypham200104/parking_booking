<div class="owner-container">
  <!-- Sidebar -->
  <aside class="owner-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <i class="ph ph-buildings text-emerald"></i>
        <span>ParkGo Owner</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/owner" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <i class="ph ph-squares-four"></i>
        <span>Tổng quan</span>
      </a>
      <a routerLink="/owner/lots" routerLinkActive="active" class="nav-item">
        <i class="ph ph-map-trifold"></i>
        <span>Bãi đỗ của tôi</span>
      </a>
      <a routerLink="/owner/bookings" routerLinkActive="active" class="nav-item">
        <i class="ph ph-ticket"></i>
        <span>Lượt đặt chỗ</span>
      </a>
      <a routerLink="/owner/staff" routerLinkActive="active" class="nav-item">
        <i class="ph ph-users-three"></i>
        <span>Nhân sự</span>
      </a>
      <a routerLink="/owner/reports" routerLinkActive="active" class="nav-item">
        <i class="ph ph-chart-line-up"></i>
        <span>Báo cáo doanh thu</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button type="button" class="nav-item owner-logout" (click)="logout()"><i class="ph ph-sign-out"></i><span>Đăng xuất</span></button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="owner-main">
    <header class="owner-topbar">
      <div class="topbar-left">
        <h2 class="topbar-title">Bảng Điều Khiển Bãi Xe</h2>
      </div>
      <div class="topbar-right">
        <app-notification-center></app-notification-center>
        <div class="user-profile">
          <div class="avatar bg-emerald">O</div>
          <span>Chủ bãi xe</span>
        </div>
        <button class="icon-btn" type="button" (click)="logout()" title="Đăng xuất" aria-label="Đăng xuất"><i class="ph ph-sign-out"></i></button>
      </div>
    </header>

    <main class="owner-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
