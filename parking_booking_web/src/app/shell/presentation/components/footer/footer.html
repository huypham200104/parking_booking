<footer class="footer">
  <div class="footer__inner container">
    <!-- Brand column -->
    <div class="footer__brand">
      <a class="footer__logo" routerLink="/" aria-label="ParkGo">
        <!-- Footer logo: always on dark background, so "Park" is always white -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" class="footer__logo-svg" aria-hidden="true">
          <g transform="rotate(15 130 150)">
            <path fill="#3b82f6" fill-rule="evenodd" d="
              M 130 40 C 174 40, 210 76, 210 120 C 210 156, 184 195, 142 242
              C 136 249, 124 249, 118 242 C 76 195, 50 156, 50 120
              C 50 76, 86 40, 130 40 Z
              M 130 80 L 100 80 L 100 170 L 125 170 L 125 140 L 130 140
              C 147 140, 160 127, 160 110 C 160 93, 147 80, 130 80 Z"
            />
            <circle cx="130" cy="110" r="12" fill="#10b981" />
          </g>
          <!-- Footer always dark bg → "Park" always white, "Go" blue -->
          <text x="280" y="175" font-family="Be Vietnam Pro, system-ui, sans-serif" font-size="76" letter-spacing="-1">
            <tspan font-weight="900" fill="#f8fafc">Park</tspan>
            <tspan font-weight="500" fill="#3b82f6">Go</tspan>
          </text>
        </svg>
      </a>
      <p class="footer__tagline">
        Đặt chỗ đậu xe thông minh<br />cho cuộc sống hiện đại.
      </p>
      <!-- App store badges (mock) -->
      <div class="footer__stores">
        <a href="#" class="footer__store-badge" aria-label="Tải trên App Store">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          App Store
        </a>
        <a href="#" class="footer__store-badge" aria-label="Tải trên Google Play">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.18 23.76c.32.18.69.19 1.04.04l12.2-7.04-2.72-2.72-10.52 9.72zm-1.18-21.2v20.88c0 .38.16.72.43.96l.1.08 11.7-11.7v-.28L2.43 1.52c-.27.24-.43.58-.43.96v.08zm16.6 12.08L16.2 12.5l2.4-2.4L22 12.5c.6.35.6.92 0 1.27l-3.4 2.12v-.27zM4.22.2c-.35-.15-.72-.14-1.04.04L14.7 9.96l-2.72 2.72L2.43 1.52 4.22.2z"/>
          </svg>
          Google Play
        </a>
      </div>
    </div>

    <!-- Link groups -->
    @for (group of footerLinks; track group.group) {
      <div class="footer__group">
        <h3 class="footer__group-title">{{ group.group }}</h3>
        <ul class="footer__group-links">
          @for (link of group.links; track link.label) {
            <li>
              <a [routerLink]="link.path" class="footer__link">{{ link.label }}</a>
            </li>
          }
        </ul>
      </div>
    }
  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <div class="container footer__bottom-inner">
      <p class="footer__copyright">
        &copy; {{ currentYear }} ParkGo. Tất cả quyền được bảo lưu.
      </p>
      <div class="footer__bottom-links">
        <a routerLink="/terms" class="footer__link">Điều khoản</a>
        <a routerLink="/privacy" class="footer__link">Bảo mật</a>
      </div>
    </div>
  </div>
</footer>
